# enjo — show the current in-progress task in the status bar.
#
# `enjo status` prints the top in-progress task (the same one that heads the
# "In progress" section in the TUI), with a "+N" counter when several are in
# progress, or "idle" when none are. `--tmux` escapes '#' so task titles can't
# inject tmux format sequences. It reads the same local SQLite DB the app uses.
#
# This appends to `status-right` (via `set -ga`) so the segment lands at the far
# right, just after the green host box, without re-declaring the rest of the
# theme's status line. Must be sourced AFTER theme.conf (which defines
# status-right).
#
# Refreshes at `status-interval` (currently 1s). To tweak placement or width,
# edit the line below; `enjo status --help` lists the options.

set -ga status-right "#[fg=#1f2329,bg=#dc6f7a,bold] ▶ #(/opt/homebrew/bin/enjo status --tmux --max-len 40) #[default]"
